<h3 class="text-center mt-3">Student Management</h3>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold">StudentApp</a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarSupportedContent"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <!-- Left Menu -->
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" routerLink="/add-student">Add Student</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/list-student">Student List</a>
        </li>
        <li>
          <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
            Dashboard
          </a>
        </li>
      </ul>

      <!-- Right Side Buttons -->
      <div class="d-flex">
        <!-- Login -->
        <button
          *ngIf="!isLoggedIn"
          routerLink="/login"
          class="btn btn-success px-4"
        >
          Login
        </button>

        <!-- Logout -->
        <button
          *ngIf="isLoggedIn"
          (click)="logout()"
          class="btn btn-danger px-4"
        >
          Logout
        </button>
      </div>
    </div>
  </div>
</nav>

<router-outlet></router-outlet>

<app-popup></app-popup>
