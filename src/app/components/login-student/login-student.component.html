<div class="container d-flex justify-content-center align-items-center vh-100">
  <!-- Loader Overlay -->
  <div *ngIf="isLoading" class="loader-overlay">
    <div class="loader-content">
      <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-3 mb-0">Authenticating...</p>
    </div>
  </div>

  <div class="card shadow p-4" style="width:400px">
    <h3 class="text-center mb-4">Principal Login</h3>

    <form (ngSubmit)="login()" #loginForm="ngForm">
      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input
          type="email"
          class="form-control"
          name="email"
          [(ngModel)]="email"
          required
          email
          #emailRef="ngModel"
          placeholder="Enter email"
          [disabled]="isLoading"
        />
        <div class="text-danger" *ngIf="emailRef.invalid && emailRef.touched">
          Valid email is required
        </div>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          name="password"
          [(ngModel)]="password"
          required
          minlength="6"
          #passwordRef="ngModel"
          placeholder="Enter password"
          [disabled]="isLoading"
        />
        <div class="text-danger" *ngIf="passwordRef.invalid && passwordRef.touched">
          Password must be at least 6 characters
        </div>
      </div>

      <!-- Login Button -->
      <div class="d-grid">
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="loginForm.invalid || isLoading"
        >
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
          {{ isLoading ? 'Logging in...' : 'Login' }}
        </button>
      </div>
    </form>

    <!-- Optional: Demo credentials hint -->
    <div class="text-center mt-3 small text-muted">
      <p class="mb-0">Demo Credentials:</p>
      <p class="mb-0">Email: principal&#64;school.com</p>
      <p>Password: 123456</p>
    </div>
  </div>
</div>
